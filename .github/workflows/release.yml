name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            ALL_COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            ALL_COMMITS=$(git log --pretty=format:"%s" "$PREV_TAG".."${{ github.ref_name }}")
          fi

          # Strip conventional commit prefix and optional scope, keep the description
          strip_prefix() {
            sed -E 's/^[a-z]+(\([^)]+\))?[!]?: //'
          }

          FEATURES=$(echo "$ALL_COMMITS" | grep -E '^feat(\(.+\))?[!:]?' | strip_prefix || true)
          FIXES=$(echo "$ALL_COMMITS" | grep -E '^(fix|bugfix)(\(.+\))?[!:]?' | strip_prefix || true)

          {
            echo "body<<EOF"
            if [ -n "$FEATURES" ]; then
              echo "### New Features"
              echo "$FEATURES" | sed 's/^/- /'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^/- /'
              echo ""
            fi
            echo "**Full Changelog**: $PREV_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TLI Wealth Tracker ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: ${{ steps.changelog.outputs.body }}
          files: |
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
